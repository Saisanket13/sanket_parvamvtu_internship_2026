<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>

<body>
    <h1>How many ways</h1>
    <p id="demo">Demo</p>

    <!-- Inline JS -->
    <button onclick="document.getElementById('demo').innerHTML = 'Hello World'">
        Inline JS
    </button>

    <!-- Internal JS -->
    <button onclick="internaljs()">Internal JS</button>

    <!-- External JS -->
    <button onclick="externaljs()">
        External JS
    </button>
<!-- addEventListener JS -->
    <button id="btn">addEventListener</button>
<script src="./2_js_types.js"></script>
    <script>
        // function internaljs() {
        //     document.getElementById('demo').innerHTML = 'Hello World';
        // }
        // function internaljs() {
        // const hello=document.getElementById('demo');
        // hello.innerHTML='<h2>Hello World</h2><p>This is a paragraph.</p>';
        // }
        // const internaljs=()=> {
        // const hello=document.getElementById('demo');
        // hello.innerHTML='<h2>Hello World</h2><p>This is a paragraph.</p>';
        // }

        // Internal JS function
        const internaljs = () => {
            const hello = document.getElementById('demo');
            hello.innerHTML = '<h2>Hello World</h2><p>This is a paragraph.</p>';
        }

        // addEventListener
        const btn = document.getElementById("btn");
        btn.addEventListener("click", () => {
            const hello = document.getElementById('demo');
            hello.innerHTML = '<h2>Hello World</h2>';
        });
    </script>

</body>

</html>

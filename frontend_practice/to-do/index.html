<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
            <div class="card ">
                <div class="card-body">
                    <div class="form-control">
                        <div class="list-group">
                            <h4 class="title">To-Do List</h4>
                            <input class="task" type="text" placeholder="Enter your task" id="task">
                           
                            <button id="task-btn" class="task" onclick="addtask()">Add Task</button>

                            <h4 class="title">Task List</h4>
                            <ul id="task-list" class="list-group">
                            </ul>

                            <button id="deltask" class="task" onclick="deltask()">Delete Task</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
    



    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
<script src="to-do.js"></script>
</body>
</html>
